name: Daglig oppdatering av VM-statistikk

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 08:00 norsk sommertid
  workflow_dispatch:        # tillat manuell kjøring fra GitHub

jobs:
  oppdater:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # nødvendig for å committe tilbake

    steps:
      - name: Hent repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install openpyxl requests

      - name: Oppdater data og Excel
        run: python oppdater.py

      - name: Generer HTML
        run: python excel_til_html.py

      - name: Commit og push endringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html *.xlsx *.json
          git diff --cached --quiet && echo "Ingen endringer" || \
            git commit -m "Auto-oppdatering $(date -u +'%Y-%m-%d %H:%M UTC')" && \
            git push
