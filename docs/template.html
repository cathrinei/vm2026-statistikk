<style>
  /* ── Grunnstiler (ikke rediger under her) ───────────────────── */
  * { box-sizing: border-box; margin: 0; padding: 0; }

  #sokefelt:focus { background: rgba(255,255,255,0.22); }
  #sok-info { color: rgba(255,255,255,0.55); font-size: 8.5pt; white-space: nowrap; min-width: 38px; text-align: right; }

  .fane-overlay-topp button { background: #f0f4f8; border: none; border-radius: 50%; width: 30px; height: 30px; font-size: 1em; cursor: pointer; color: #0F2044; line-height: 1; }

  #dark-mode-knapp:hover { background: rgba(255,255,255,0.28); }
  body.dark-mode { background: #0f1219; color: #dde3f0; }

  body.dark-mode .ark-innhold h2 { color: #7eb3f5; border-color: #3b6fb5; }

  body.dark-mode .lagstat-nav a:hover { background: #0f1d38; }

  /* ── Sorterbare kolonneoverskrifter ─────────────────── */

<script>
function finnTabKnapp(id) {
  for (const k of document.querySelectorAll('.tab-bar button')) {
    if ((k.getAttribute('onclick') || '').includes("'" + id + "'")) return k;
  }
  return null;
}

function visArk(id, oppdaterHash = true) {
  document.querySelectorAll('.ark-innhold').forEach(el => el.style.display = 'none');
  document.querySelectorAll('.tab-bar button').forEach(b => b.classList.remove('aktiv'));
  const ark = document.getElementById('ark_' + id);
  if (ark) ark.style.display = 'block';
  const knapp = finnTabKnapp(id);
  if (knapp) {
    knapp.classList.add('aktiv');
    knapp.scrollIntoView({behavior: 'smooth', block: 'nearest', inline: 'center'});
  }
  document.querySelectorAll('.fane-gruppe-knapper button').forEach(b => b.classList.remove('aktiv'));
  const overlayKnapp = document.querySelector('.fane-gruppe-knapper button[data-id="' + id + '"]');
  if (overlayKnapp) overlayKnapp.classList.add('aktiv');
  const sok = document.getElementById('sokefelt');
  if (sok) { sok.value = ''; sokITabell(''); }
  lukkSokPanel();
  if (oppdaterHash) history.replaceState(null, '', '#' + id);
}

function navigerTilHash(hash) {
  if (!hash || hash === '#') return;
  const id = hash.replace(/^#/, '');
  if (document.getElementById('ark_' + id)) {
    visArk(id, false);
    return;
  }
  const el = document.getElementById(id);
  if (el) {
    const ark = el.closest('.ark-innhold');
    if (ark) {
      visArk(ark.id.replace(/^ark_/, ''), false);
      setTimeout(() => el.scrollIntoView({ behavior: 'smooth', block: 'start' }), 150);
    }
  }
}

window.addEventListener('hashchange', () => navigerTilHash(location.hash));

function escapeRegex(s) {
  return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function gjenopprettHighlight() {
  document.querySelectorAll('td[data-original]').forEach(td => {
    td.innerHTML = td.getAttribute('data-original');
    td.removeAttribute('data-original');
  });
}

function sokITabell(q) {
  lukkSokPanel();
  const tekst = q.toLowerCase().trim();
  const synligArk = document.querySelector('.ark-innhold[style*="block"]');
  if (!synligArk) return;
  gjenopprettHighlight();
  let treff = 0, total = 0;
  const regex = tekst ? new RegExp(escapeRegex(tekst), 'gi') : null;
  synligArk.querySelectorAll('tr').forEach(rad => {
    if (rad.querySelector('th')) { rad.style.display = ''; return; }
    total++;
    if (!tekst || rad.textContent.toLowerCase().includes(tekst)) {
      rad.style.display = ''; treff++;
      if (regex) {
        rad.querySelectorAll('td').forEach(td => {
          if (td.textContent.toLowerCase().includes(tekst)) {
            const orig = td.innerHTML;
            const highlighted = orig.replace(regex, m => '<mark class="sok-mark">' + m + '</mark>');
            if (highlighted !== orig) {
              td.setAttribute('data-original', orig);
              td.innerHTML = highlighted;
            }
          }
        });
      }
    } else {
      rad.style.display = 'none';
    }
  });
  const info = document.getElementById('sok-info');
  if (info) info.textContent = tekst ? treff + '/' + total : '';
}

function lukkSokPanel() {
  const panel = document.getElementById('sok-panel');
  if (panel) panel.classList.remove('synlig');
}

function finnFaneNavn(arkId) {
  const knapp = document.querySelector('.tab-bar button[onclick*="' + arkId + '"]');
  return knapp ? knapp.textContent.trim() : arkId.replace(/_/g, ' ');
}

function sokAlleArk(q) {
  const tekst = q.toLowerCase().trim();
  if (!tekst) { lukkSokPanel(); return; }
  const MAX_PER_FANE = 8;
  const resultater = [];
  document.querySelectorAll('.ark-innhold').forEach(ark => {
    const arkId = ark.id.replace('ark_', '');
    const treff = [];
    ark.querySelectorAll('tr').forEach(rad => {
      if (rad.querySelector('th')) return;
      const celler = rad.querySelectorAll('td');
      if (!celler.length) return;
      if (rad.textContent.toLowerCase().includes(tekst)) {
        const radTekst = Array.from(celler).slice(0, 6).map(td => td.textContent.trim()).filter(Boolean).join(' · ');
        treff.push(radTekst);
      }
    });
    if (treff.length) resultater.push({ arkId, faneTekst: finnFaneNavn(arkId), treff });
  });
  visSokPanel(resultater, tekst);
}

function visSokPanel(resultater, tekst) {
  const panel = document.getElementById('sok-panel');
  if (!panel) return;
  const regex = new RegExp(escapeRegex(tekst), 'gi');
  if (!resultater.length) {
    panel.innerHTML = '<div class="sok-panel-tom">Ingen treff på «' + tekst + '» i noen fane</div>';
    panel.classList.add('synlig');
    return;
  }
  const MAX_PER_FANE = 8;
  let html = '<div class="sok-panel-hint">Trykk på et treff for å hoppe til fanen &nbsp;·&nbsp; Esc for å lukke</div>';
  resultater.forEach(({ arkId, faneTekst, treff }) => {
    html += '<div class="sok-panel-gruppe-tittel">' + faneTekst + ' (' + treff.length + ')</div>';
    treff.slice(0, MAX_PER_FANE).forEach(radTekst => {
      const hl = radTekst.replace(regex, m => '<mark class="sok-mark">' + m + '</mark>');
      html += '<div class="sok-panel-rad" onclick="visArk(\'' + arkId + '\')">' + hl + '</div>';
    });
    if (treff.length > MAX_PER_FANE) {
      html += '<div class="sok-panel-mer">… og ' + (treff.length - MAX_PER_FANE) + ' til</div>';
    }
  });
  panel.innerHTML = html;
  panel.classList.add('synlig');
}

function toggleFaneMeny() {
  document.getElementById('fane-overlay').classList.toggle('synlig');
}

function byggFaneMeny() {
  const kategorier = [
    { navn: 'Gruppespill og spillertropper', test: function(n) { return /^Gruppe [A-L]$/.test(n); } },
    { navn: 'Sluttspill',                    test: function(n) { return /(delsfinale|kvartfinaler|semifinaler|bronsefinale|^finale$)/i.test(n); } },
    { navn: 'Statistikk',                    test: function() { return true; } },
  ];
  var data = [];
  document.querySelectorAll('.tab-bar button').forEach(function(k) {
    var m = (k.getAttribute('onclick') || '').match(/visArk\('([^']+)'\)/);
    if (m) data.push({ id: m[1], navn: k.textContent.trim(), aktiv: k.classList.contains('aktiv') });
  });
  var container = document.getElementById('fane-grupper');
  var brukte = new Set();
  kategorier.forEach(function(kat) {
    var btns = data.filter(function(d) { return !brukte.has(d.id) && kat.test(d.navn); });
    btns.forEach(function(d) { brukte.add(d.id); });
    if (!btns.length) return;
    var seksjon = document.createElement('div');
    seksjon.className = 'fane-gruppe';
    seksjon.innerHTML = '<div class="fane-gruppe-tittel">' + kat.navn + '</div>';
    var rad = document.createElement('div');
    rad.className = 'fane-gruppe-knapper';
    btns.forEach(function(d) {
      var b = document.createElement('button');
      b.textContent = d.navn;
      b.dataset.id = d.id;
      if (d.aktiv) b.classList.add('aktiv');
      b.onclick = function() { visArk(d.id); toggleFaneMeny(); };
      rad.appendChild(b);
    });
    seksjon.appendChild(rad);
    container.appendChild(seksjon);
  });
  var antallEl = document.getElementById('fane-antall');
  if (antallEl) antallEl.textContent = data.length;
}

function scrollTab(dir) {
  var tb = document.querySelector('.tab-bar');
  if (tb) tb.scrollBy({ left: dir * 180, behavior: 'smooth' });
}

function oppdaterScrollKnapper() {
  var tb = document.querySelector('.tab-bar');
  var v = document.getElementById('tab-pil-venstre');
  var h = document.getElementById('tab-pil-høyre');
  if (!tb || !v || !h) return;
  v.style.display = tb.scrollLeft > 4 ? 'flex' : 'none';
  h.style.display = tb.scrollLeft < tb.scrollWidth - tb.clientWidth - 4 ? 'flex' : 'none';
}

function applyDark(on) {
  document.body.classList.toggle('dark-mode', on);
  document.getElementById('dark-mode-knapp').textContent = on ? '☀ Lys' : '☾ Mørk';
}
function toggleDarkMode() {
  const on = !document.body.classList.contains('dark-mode');
  localStorage.setItem('darkMode', on ? '1' : '0');
  applyDark(on);
}

function byggSpillerLenker() {
  const tropp = new Set();
  document.querySelectorAll('[id^="ark_Gruppe_"]').forEach(ark => {
    ark.querySelectorAll('tr').forEach(tr => {
      const tds = tr.querySelectorAll('td');
      if (tds.length >= 2 && /^\d+$/.test(tds[0].textContent.trim())) {
        const navn = tds[1].textContent.trim();
        tropp.add(navn);
        tds[1].classList.add('spiller-lenke');
      }
    });
  });
  ['ark_Scorere_og_assists', 'ark_Kort'].forEach(id => {
    const ark = document.getElementById(id);
    if (!ark) return;
    ark.querySelectorAll('tr').forEach(tr => {
      const tds = tr.querySelectorAll('td');
      if (tds.length >= 2 && !tds[1].hasAttribute('colspan')) {
        const navn = tds[1].textContent.trim();
        if (tropp.has(navn)) tds[1].classList.add('spiller-lenke');
      }
    });
  });
}

// ── Sorterbare kolonneoverskrifter ───────────────────
function parseCell(tekst) {
  const s = (tekst || '').trim();
  if (!s || s === '-') return { type: 'empty', val: '' };
  if (/^\d+%$/.test(s)) return { type: 'num', val: parseFloat(s) };
  if (/^\d+\/\d+$/.test(s)) return { type: 'text', val: s };
  const norm = s.replace(',', '.');
  const n = parseFloat(norm);
  if (!isNaN(n) && /^-?[\d.]+$/.test(norm)) return { type: 'num', val: n };
  return { type: 'text', val: s.toLowerCase() };
}

function compareVerdier(a, b, dir) {
  const m = dir === 'asc' ? 1 : -1;
  if (a.type === 'empty' && b.type === 'empty') return 0;
  if (a.type === 'empty') return 1;
  if (b.type === 'empty') return -1;
  if (a.type === 'num' && b.type === 'num') return m * (a.val - b.val);
  if (a.type === 'num') return -m;
  if (b.type === 'num') return m;
  return m * a.val.localeCompare(b.val, 'no');
}

function hentSeksjonsrader(headerRow) {
  // Rader etter headeren (vanlig tilfelle)
  const etterRader = [];
  let node = headerRow.nextElementSibling;
  while (node) {
    if (node.dataset.sortTitle === '1' || node.dataset.sortHeader === '1') break;
    etterRader.push(node);
    node = node.nextElementSibling;
  }
  // Rader FØR headeren (f.eks. kamprader i gruppeark, topp-lag i Lagstatistikk)
  const førRader = [];
  node = headerRow.previousElementSibling;
  while (node && node.dataset.sortTitle !== '1' && node.dataset.sortHeader !== '1') {
    const celler = node.querySelectorAll('td');
    const erInfoRad = celler.length === 1 && parseInt(celler[0].getAttribute('colspan') || '1') > 3;
    const erTom = !erInfoRad && [...celler].every(td => !td.textContent.trim());
    if (!erInfoRad && !erTom) førRader.unshift(node);
    node = node.previousElementSibling;
  }
  return { førRader, etterRader, alle: [...førRader, ...etterRader] };
}

function oppdaterPil(td, tilstand) {
  const piler = { none: '⇅', asc: '↑', desc: '↓' };
  td.dataset.sortArrow = piler[tilstand] || '⇅';
  td.dataset.sortState = tilstand;
}

function sorterSeksjon(headerRow, kolIndex, retning) {
  const { førRader, etterRader, alle } = hentSeksjonsrader(headerRow);
  if (!headerRow._originalOrder) {
    headerRow._originalOrder = { før: [...førRader], etter: [...etterRader] };
  }

  const parent = headerRow.parentNode;

  if (retning === 'none') {
    // Gjenopprett: etter-rader tilbake etter header, før-rader tilbake før header
    const orig = headerRow._originalOrder;
    let insertAfter = headerRow;
    orig.etter.forEach(rad => {
      parent.insertBefore(rad, insertAfter.nextSibling);
      insertAfter = rad;
    });
    let insertBeforeNode = headerRow;
    [...orig.før].reverse().forEach(rad => {
      parent.insertBefore(rad, insertBeforeNode);
      insertBeforeNode = rad;
    });
  } else {
    // Sorter alle rader samlet og legg dem etter header
    const sortertRader = [...alle].sort((a, b) => {
      const tA = a.querySelectorAll('td')[kolIndex];
      const tB = b.querySelectorAll('td')[kolIndex];
      return compareVerdier(
        parseCell(tA ? tA.textContent : ''),
        parseCell(tB ? tB.textContent : ''),
        retning
      );
    });
    let insertAfter = headerRow;
    sortertRader.forEach(rad => {
      parent.insertBefore(rad, insertAfter.nextSibling);
      insertAfter = rad;
    });
  }

  // Kolonnehighlight
  alle.forEach(rad => rad.querySelectorAll('td').forEach(td => td.classList.remove('sort-kol-aktiv')));
  if (retning !== 'none') {
    alle.forEach(rad => {
      const td = rad.querySelectorAll('td')[kolIndex];
      if (td) td.classList.add('sort-kol-aktiv');
    });
  }

  // Scroll slik at toppen av seksjonen vises
  const navHoyde = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--nav-hoyde')) || 0;
  const titelRad = (function() {
    let node = headerRow.previousElementSibling;
    while (node && node.dataset.sortTitle !== '1') node = node.previousElementSibling;
    return node || headerRow;
  })();
  const rect = titelRad.getBoundingClientRect();
  const målScroll = window.pageYOffset + rect.top - navHoyde - 6;
  if (rect.top < navHoyde || rect.top > window.innerHeight * 0.45) {
    window.scrollTo({ top: målScroll, behavior: 'smooth' });
  }
}

function oppdaterNavHoyde() {
  const nav = document.querySelector('.nav-wrapper');
  if (nav) document.documentElement.style.setProperty('--nav-hoyde', nav.offsetHeight + 'px');
}

function initialiserSortering() {
  document.querySelectorAll('tr[data-sort-header="1"]').forEach(headerRow => {
    headerRow.querySelectorAll('td').forEach((td, i) => {
      const tekst = td.textContent.trim();
      const colspan = parseInt(td.getAttribute('colspan') || '1');
      if (!tekst || colspan > 1) return;

      td.dataset.sortCol = String(i);
      oppdaterPil(td, 'none');

      td.addEventListener('click', function () {
        const tilstand = this.dataset.sortState || 'none';
        headerRow.querySelectorAll('td[data-sort-col]').forEach(h => {
          if (h !== this) oppdaterPil(h, 'none');
        });
        const neste = tilstand === 'none' ? 'asc'
                    : tilstand === 'asc'  ? 'desc' : 'none';
        oppdaterPil(this, neste);
        sorterSeksjon(headerRow, i, neste);
      });
    });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  byggFaneMeny();
  oppdaterNavHoyde();
  window.addEventListener('resize', oppdaterNavHoyde);
  initialiserSortering();
  if (location.hash) navigerTilHash(location.hash);
  var tb = document.querySelector('.tab-bar');
  if (tb) tb.addEventListener('scroll', oppdaterScrollKnapper);
  oppdaterScrollKnapper();

  applyDark(localStorage.getItem('darkMode') === '1');

  const sokefelt = document.getElementById('sokefelt');
  if (sokefelt) {
    sokefelt.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); sokAlleArk(this.value); }
      if (e.key === 'Escape') { lukkSokPanel(); this.blur(); }
    });
  }
  document.addEventListener('click', function(e) {
    const spillerTd = e.target.closest('td.spiller-lenke');
    if (spillerTd) {
      const navn = spillerTd.textContent.trim();
      document.getElementById('sokefelt').value = navn;
      sokAlleArk(navn);
      return;
    }
    if (!e.target.closest('#sok-panel') && !e.target.closest('#sokefelt')) lukkSokPanel();
  });

  byggSpillerLenker();
});
</script>
