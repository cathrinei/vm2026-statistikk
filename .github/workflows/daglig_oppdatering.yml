name: Daglig oppdatering av VM-statistikk

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC = 08:00 norsk sommertid
    - cron: "0 8 * * *"   # 08:00 UTC = 10:00 norsk sommertid (reserve)
  workflow_dispatch:        # tillat manuell kjøring fra GitHub
  push:
    paths:
      - "docs/template.html"  # regenerer index.html automatisk ved template-endring

jobs:
  oppdater:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # nødvendig for å committe tilbake

    steps:
      - name: Hent repo
        uses: actions/checkout@v4

      - name: Sett opp Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer avhengigheter
        run: pip install openpyxl requests

      - name: Oppdater data og Excel
        if: github.event_name != 'push'
        run: python oppdater.py 2>&1 | tee oppdater_logg.txt; exit ${PIPESTATUS[0]}

      - name: Generer HTML
        run: python excel_til_html.py 2>&1 | tee html_logg.txt; exit ${PIPESTATUS[0]}

      - name: Generer offensiv analyse
        run: python generer_offensiv_analyse.py 2>&1 | tee offensiv_logg.txt; exit ${PIPESTATUS[0]}

      - name: Commit og push endringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/offensiv_analyse.html *.xlsx *.json
          git diff --cached --quiet && echo "Ingen endringer" || \
            git commit -m "Auto-oppdatering $(date -u +'%Y-%m-%d %H:%M UTC')" && \
            git push

      - name: Vis feillogg ved feil
        if: failure()
        run: |
          echo "========================================"
          echo "  FEILLOGG — oppdater.py"
          echo "========================================"
          if [ -f oppdater_logg.txt ]; then
            grep -A 20 "Traceback\|Error\|FEIL" oppdater_logg.txt || tail -30 oppdater_logg.txt
          else
            echo "(ingen logg funnet)"
          fi
          echo ""
          echo "========================================"
          echo "  FEILLOGG — excel_til_html.py"
          echo "========================================"
          if [ -f html_logg.txt ]; then
            grep -A 20 "Traceback\|Error" html_logg.txt || tail -10 html_logg.txt
          else
            echo "(ikke kjørt)"
          fi
